name: VeriFlow | Compile and Test

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Compile and Test 🛠️"

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Elixir"
        uses: erlef/setup-elixir@v1
        with:
          otp-version: "25.0"
          elixir-version: "1.14.0"

      - name: "Cache Mix dependencies"
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix

      - name: "Install Dependencies"
        run: mix deps.get

      - name: "Install ChromeDriver"
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          mkdir -p /home/runner/snap/chromium/common/.cache
          touch /home/runner/snap/chromium/common/.cache/desktop-runtime-date || echo "Skipping touch"
          chromedriver --version

      - name: "Start ChromeDriver on port 64584"
        run: |
          set -x
          nohup chromedriver --port=64584 --url-base=/wd/hub --verbose &
          for i in {1..10}; do
            if curl -s http://localhost:64584/wd/hub/status | grep '"ready":true' > /dev/null; then
              echo "ChromeDriver is running on port 64584"
              break
            fi
            echo "Waiting for ChromeDriver to be ready..."
            sleep 2
          done
          curl -s http://localhost:64584/wd/hub/status || echo "ChromeDriver status check failed"

      - name: "Compile Project"
        run: mix compile

      - name: "Run Tests"
        run: mix test --trace
