name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up Elixir
        uses: erlef/actions/setup-elixir@v1
        with:
          otp-version: '23.3'
          elixir-version: '1.12.3'
      - name: Install Dependencies
        run: mix deps.get
      - name: Run Tests
        run: mix test
